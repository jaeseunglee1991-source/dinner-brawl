<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>저녁 메뉴 2D 대난투</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #2c3e50; margin: 0; padding: 10px; color: white; }
        h1 { text-align: center; margin: 5px 0 15px 0; color: #ecf0f1; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        /* 2D 게임 전용 레이아웃 (3단 구성) */
        .game-layout { display: flex; gap: 15px; max-width: 1400px; margin: 0 auto; height: 80vh; }
        
        /* 좌측: 참가자 & 채팅창 */
        .left-panel { flex: 1; background: #34495e; padding: 15px; border-radius: 10px; display: flex; flex-direction: column; }
        .participant-list { flex: 1; background: #2c3e50; border-radius: 5px; padding: 10px; margin-bottom: 15px; overflow-y: auto; }
        .chat-box { flex: 2; background: #ecf0f1; border-radius: 5px; padding: 10px; color: #333; display: flex; flex-direction: column; }
        #chatMessages { flex: 1; overflow-y: auto; margin-bottom: 10px; font-size: 14px; }
        .chat-input-area { display: flex; gap: 5px; }
        .chat-input-area input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .chat-input-area button { padding: 8px 15px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }

        /* 중앙: 2D 캔버스 전장 */
        .center-panel { flex: 2.5; background: #27ae60; border-radius: 10px; position: relative; display: flex; flex-direction: column; align-items: center; border: 4px solid #1e8449; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        .canvas-overlay { position: absolute; top: 10px; text-align: center; z-index: 10; font-weight: bold; text-shadow: 1px 1px 2px black; pointer-events: none; }
        
        /* 우측: 내 카드 정보 & 상성표 */
        .right-panel { flex: 1.2; background: #34495e; padding: 15px; border-radius: 10px; overflow-y: auto; }
        .card-item { background: #ecf0f1; color: #333; padding: 10px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #e74c3c; }
        .card-item.dead { opacity: 0.5; filter: grayscale(100%); text-decoration: line-through; border-left-color: #7f8c8d; }

        /* 입장 폼 화면 */
        #joinForm { max-width: 500px; margin: 50px auto; background: white; color: #333; padding: 30px; border-radius: 10px; text-align: center; }
        #joinForm input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        #joinForm button { width: 95%; padding: 15px; background-color: #e67e22; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; font-weight: bold; }
        
        .hidden { display: none !important; }
        .master-btn { position: absolute; bottom: 20px; padding: 15px 30px; background-color: #e74c3c; color: white; border: none; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; z-index: 20; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .master-btn:hover { background-color: #c0392b; }
        
        /* 디테일 토글 디자인 */
        details { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px; margin-bottom: 15px; }
        summary { cursor: pointer; font-weight: bold; }
    </details>
    </style>
</head>
<body>
    <h1>🎮 저녁 메뉴 2D 대난투 🎮</h1>

    <div id="joinForm">
        <h2>전장 입장</h2>
        <input type="text" id="roomInput" placeholder="방 코드 (예: dinner2d)">
        <input type="text" id="nameInput" placeholder="내 이름">
        <hr>
        <input type="text" id="menu1" placeholder="메뉴 1 (필수) ex) 피자">
        <input type="text" id="menu2" placeholder="메뉴 2 (선택)">
        <input type="text" id="menu3" placeholder="메뉴 3 (선택)">
        <button onclick="joinGame()">전장 참여하기</button>
    </div>

    <div id="gameUI" class="hidden game-layout">
        
        <div class="left-panel">
            <h3>👥 참가자 목록</h3>
            <div id="playerList" class="participant-list"></div>
            
            <h3>💬 실시간 채팅</h3>
            <div class="chat-box">
                <div id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="채팅 입력..." onkeypress="if(event.key==='Enter') sendChat()">
                    <button onclick="sendChat()">전송</button>
                </div>
            </div>
        </div>

        <div class="center-panel">
            <div class="canvas-overlay" id="roundText">대기 중...</div>
            <canvas id="gameCanvas"></canvas>
            <button id="startBtn" class="hidden master-btn" onclick="startGame()">⚔️ 대난투 시작 (방장 전용) ⚔️</button>
        </div>

        <div class="right-panel">
            <details open>
                <summary>🔄 7대 특성 상성표 (클릭)</summary>
                <div style="font-size: 13px; margin-top: 10px;">
                    <b style="color:#e74c3c">매콤</b> > 느끼 > 깔끔 > 짭짤 > 달콤 > <b style="color:#e74c3c">매콤</b><br><br>
                    <b style="color:#3498db">⭐특수: 민트초코 🌿 & 파인애플피자 🍍</b><br>
                    - 일반 특성 때릴 때: <b>데미지 2배!</b><br>
                    - 특수끼리 부딪히면: <b>세계관 붕괴 (서로 999 피해 폭발)</b>
                </div>
            </details>
            
            <h3>🎴 실시간 카드 현황</h3>
            <div id="cardList"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let myRoom = "", myName = "";
        let playersData = [];
        
        // 2D 캔버스 엔진 변수들
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let entities = {}; // 캔버스에 그려질 몬스터(카드) 객체들
        let floatingTexts = []; // 데미지 텍스트 효과
        const affinityEmoji = { 'SPICY':'🌶️', 'GREASY':'🍗', 'FRESH':'🥗', 'SALTY':'🧂', 'SWEET':'🍰', 'MINT_CHOCO':'🌿', 'PINEAPPLE':'🍍' };

        // 캔버스 크기 맞춤
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        // 게임 참여
        function joinGame() {
            myRoom = document.getElementById('roomInput').value.trim();
            myName = document.getElementById('nameInput').value.trim();
            const menus = [
                document.getElementById('menu1').value.trim(),
                document.getElementById('menu2').value.trim(),
                document.getElementById('menu3').value.trim()
            ].filter(m => m !== "");

            if(!myRoom || !myName || menus.length === 0) return alert("빈칸을 채워주세요!");

            socket.emit('joinRoom', { roomId: myRoom, playerName: myName, menus });
            document.getElementById('joinForm').classList.add('hidden');
            document.getElementById('gameUI').classList.remove('hidden');
            resizeCanvas();
        }

        // 채팅 시스템
        function sendChat() {
            const input = document.getElementById('chatInput');
            if(input.value.trim() === '') return;
            socket.emit('chatMessage', { roomId: myRoom, sender: myName, text: input.value });
            input.value = '';
        }

        socket.on('chatMessage', (data) => {
            const chatBox = document.getElementById('chatMessages');
            const color = data.sender === 'System' ? 'color: red;' : 'color: #2980b9; font-weight: bold;';
            chatBox.innerHTML += `<div style="margin-bottom: 5px;"><span style="${color}">${data.sender}:</span> ${data.text}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        // 방장 권한
        socket.on('joined', (data) => {
            if(data.isMaster) document.getElementById('startBtn').classList.remove('hidden');
        });

        function startGame() {
            socket.emit('startGame', myRoom);
            document.getElementById('startBtn').classList.add('hidden');
        }

        // UI 갱신 (참가자, 카드 목록, 캔버스 엔티티 생성)
        socket.on('updatePlayers', (players) => {
            playersData = players;
            
            // 1. 참가자 목록 갱신
            const pList = document.getElementById('playerList');
            pList.innerHTML = players.map(p => `<div>👤 ${p.name} (생존: ${p.deck.filter(c=>c.isAlive).length}장)</div>`).join('');

            // 2. 우측 카드 현황 갱신
            const cardList = document.getElementById('cardList');
            cardList.innerHTML = '';
            players.forEach(p => {
                p.deck.forEach(c => {
                    cardList.innerHTML += `
                        <div class="card-item ${c.isAlive ? '' : 'dead'}">
                            <b>${c.menu}</b> (${p.name})<br>
                            ${affinityEmoji[c.affinity]} HP: ${c.hp}/${c.maxHp} | ATK: ${c.atk}
                        </div>
                    `;
                    
                    // 3. 2D 캔버스 엔티티 동기화 (없으면 생성)
                    if(!entities[c.id]) {
                        entities[c.id] = {
                            id: c.id, menu: c.menu, hp: c.hp, maxHp: c.maxHp, isAlive: c.isAlive,
                            emoji: affinityEmoji[c.affinity],
                            x: Math.random() * (canvas.width - 100) + 50, // 랜덤 좌표
                            y: Math.random() * (canvas.height - 100) + 50,
                            baseX: 0, baseY: 0,
                            color: `hsl(${Math.random() * 360}, 70%, 60%)` // 각자 랜덤 색상
                        };
                        entities[c.id].baseX = entities[c.id].x;
                        entities[c.id].baseY = entities[c.id].y;
                    } else {
                        entities[c.id].hp = c.hp;
                        entities[c.id].isAlive = c.isAlive;
                    }
                });
            });
        });

        // --- 2D 캔버스 엔진 핵심 --- //
        
        // 전투 로그 수신 (화면 상단 라운드 텍스트)
        socket.on('battleLog', (htmlMsg) => {
            document.getElementById('roundText').innerHTML = htmlMsg;
        });

        // 대난투 애니메이션 (돌진 액션)
        socket.on('playBrawlAnimation', (attackEvents) => {
            attackEvents.forEach(ev => {
                let attacker = entities[ev.attackerId];
                let target = entities[ev.targetId];
                if(attacker && target) {
                    // 공격자가 타겟 위치로 쓩 날아가는 애니메이션 (목표 좌표 설정)
                    attacker.targetX = target.x;
                    attacker.targetY = target.y;
                    
                    // 타격 시점에 데미지 텍스트 띄우기 (간단히 딜레이 줌)
                    setTimeout(() => {
                        let text = ev.damage === 999 ? "💥폭발!" : `-${ev.damage}`;
                        let color = ev.isCrit ? "red" : (ev.damage === 999 ? "magenta" : "white");
                        floatingTexts.push({ x: target.x, y: target.y, text, color, alpha: 1.0 });
                        
                        // 제자리로 복귀
                        attacker.targetX = attacker.baseX;
                        attacker.targetY = attacker.baseY;
                    }, 500); 
                }
            });
        });

        // 게임 종료 처리
        socket.on('gameFinished', (menu) => {
            document.getElementById('roundText').innerHTML = `🎉 최종 우승: [ ${menu} ] 🎉`;
            floatingTexts.push({ x: canvas.width/2, y: canvas.height/2, text: `우승: ${menu}!`, color: "gold", alpha: 1.0, size: 50 });
        });

        // 60FPS 애니메이션 루프
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 카드들 그리기
            Object.values(entities).forEach(e => {
                if(!e.isAlive) return; // 죽은 애는 안 그림
                
                // 부드러운 이동 (Lerp)
                if(e.targetX) e.x += (e.targetX - e.x) * 0.1;
                if(e.targetY) e.y += (e.targetY - e.y) * 0.1;

                // 본체 원 그리기
                ctx.beginPath();
                ctx.arc(e.x, e.y, 25, 0, Math.PI * 2);
                ctx.fillStyle = e.color;
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;
                ctx.stroke();

                // 이모지 및 메뉴 이름
                ctx.font = "20px Arial";
                ctx.textAlign = "center";
                ctx.fillText(e.emoji, e.x, e.y + 7);
                ctx.font = "14px Malgun Gothic";
                ctx.fillStyle = "white";
                ctx.fillText(e.menu, e.x, e.y - 35);

                // 체력바
                ctx.fillStyle = "red";
                ctx.fillRect(e.x - 20, e.y + 30, 40, 6);
                ctx.fillStyle = "lime";
                let hpRatio = Math.max(0, e.hp / e.maxHp);
                ctx.fillRect(e.x - 20, e.y + 30, 40 * hpRatio, 6);
            });

            // 데미지 플로팅 텍스트 그리기
            for(let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i];
                ctx.globalAlpha = ft.alpha;
                ctx.fillStyle = ft.color;
                ctx.font = `bold ${ft.size || 24}px Arial`;
                ctx.textAlign = "center";
                ctx.fillText(ft.text, ft.x, ft.y);
                
                ft.y -= 1; // 위로 떠오름
                ft.alpha -= 0.02; // 점점 투명
                if(ft.alpha <= 0) floatingTexts.splice(i, 1);
            }
            ctx.globalAlpha = 1.0;

            requestAnimationFrame(gameLoop);
        }
        
        // 애니메이션 루프 시작
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
