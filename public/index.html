<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>저녁 메뉴 3D 대난투</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* 기본 리셋 및 폰트 */
        * { box-sizing: border-box; }
        html, body { font-family: 'Malgun Gothic', sans-serif; background-color: #1a252f; margin: 0; padding: 0; height: 100vh; color: white; overflow: hidden; }
        h1, h2, h3 { margin: 10px 0; text-align: center; color: #ecf0f1; }
        
        /* 로그인 / 대기실 팝업창 스타일 */
        .screen { display: none; max-width: 600px; margin: 30px auto; background: white; color: #333; padding: 25px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: relative; }
        .screen.active { display: block; }
        
        input { width: 90%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .btn { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-blue { background-color: #2980b9; } .btn-blue:hover { background-color: #21618c; }
        .btn-green { background-color: #27ae60; } .btn-green:hover { background-color: #1e8449; }
        .btn-gray { background-color: #7f8c8d; } .btn-gray:hover { background-color: #616a6b; }
        .btn-red { background-color: #c0392b; } .btn-red:hover { background-color: #922b21; }
        .btn-logout { position: absolute; top: 20px; right: 20px; background-color: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .text-link { color: #2980b9; cursor: pointer; text-decoration: underline; font-size: 14px; margin-top: 15px; display: inline-block; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; font-size: 14px; }
        th { background-color: #34495e; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; color:#333; }
        tr:nth-child(odd) { color:#333; }
        tr:hover { background-color: #d6eaf8; cursor: pointer; }

        /* ====================================================
           게임 화면 레이아웃 (5:5 분할 및 하단 3분할) 
           ==================================================== */
        #screen-game { 
            display: none; flex-direction: column; height: 100vh; width: 100vw; max-width: none; 
            margin: 0; padding: 10px; background: #2c3e50; border-radius: 0; box-shadow: none;
        }
        #screen-game.active { display: flex; }

        /* 위 50%: 3D 전투 화면 */
        .battle-container {
            flex: 1; /* 높이 50% 차지 */
            background: #27ae60; border: 4px solid #1e8449; border-radius: 10px;
            position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;
            margin-bottom: 10px;
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        .battle-overlay { position: absolute; top: 10px; left: 0; width: 100%; text-align: center; z-index: 10; pointer-events: none; }
        .battle-text { font-size: 24px; font-weight: bold; color: white; text-shadow: 2px 2px 4px black; }
        
        .battle-ui-buttons { position: absolute; bottom: 15px; left: 0; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 20; }
        .action-btn { padding: 10px 20px; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        .action-btn:hover { transform: translateY(-2px); }

        /* 아래 50%: 3분할 패널 */
        .bottom-container {
            flex: 1; /* 높이 50% 차지 */
            display: flex; gap: 10px;
        }
        
        .panel { 
            background: #34495e; border-radius: 8px; padding: 10px; 
            display: flex; flex-direction: column; overflow: hidden; border: 2px solid #2c3e50;
        }
        .panel h3 { margin-top: 0; font-size: 16px; border-bottom: 1px solid #7f8c8d; padding-bottom: 5px; }

        /* 좌측: 실시간 채팅 */
        .chat-panel { flex: 1; min-width: 250px; }
        #chatMessages { flex: 1; background: #ecf0f1; color: #333; padding: 10px; border-radius: 5px; overflow-y: auto; font-size: 14px; margin-bottom: 10px; text-align: left; }
        .chat-input-area { display: flex; gap: 5px; }
        .chat-input-area input { flex: 1; padding: 8px; margin: 0; border: none; border-radius: 3px; }
        .chat-input-area button { background: #3498db; color: white; border: none; padding: 0 15px; cursor: pointer; border-radius: 3px; font-weight: bold; }

        /* 중앙: 전투 로그 창 */
        .log-panel { flex: 1; min-width: 250px; }
        #logMessages { flex: 1; background: #1a252f; color: #ecf0f1; padding: 10px; border-radius: 5px; overflow-y: auto; font-size: 13px; text-align: left; line-height: 1.5; }

        /* 우측: 도감 버튼 및 카드 정보 판 */
        .right-panel { flex: 1; min-width: 250px; transition: all 0.3s ease; position: relative; }
        .right-panel.minimized { flex: 0; min-width: 0; width: 0; padding: 0; border: none; margin: 0; opacity: 0; overflow: hidden; }
        
        .guide-buttons { display: flex; gap: 5px; margin-bottom: 10px; }
        .guide-btn { flex: 1; padding: 8px 5px; font-size: 12px; background: #9b59b6; color: white; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; }
        .guide-btn:hover { background: #8e44ad; }
        
        #cardList { flex: 1; overflow-y: auto; padding-right: 5px; }
        .card-item { background: #ecf0f1; color: #333; padding: 8px; margin-bottom: 8px; border-radius: 5px; border-left: 5px solid #e74c3c; font-size: 13px; cursor: pointer; text-align: left; }
        .card-item:hover { transform: scale(1.02); }
        .card-item.dead { opacity: 0.5; filter: grayscale(100%); text-decoration: line-through; border-left-color: #7f8c8d !important; }

        /* 우측 패널 토글 버튼 */
        .toggle-btn { position: absolute; right: 10px; top: -35px; background: #f39c12; border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; z-index: 50; }

        /* 모달 (팝업창) 스타일 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; color: #333; padding: 20px; border-radius: 10px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; text-align: left; position: relative; }
        .modal-content h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .modal-close { position: absolute; top: 15px; right: 20px; background: #e74c3c; color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="infoModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">닫기 ✖</button>
            <h2 id="modalTitle">정보</h2>
            <div id="modalBody" style="font-size: 14px; line-height: 1.6;"></div>
        </div>
    </div>

    <div id="screen-auth" class="screen active">
        <div id="login-form">
            <h2>🔑 로그인</h2>
            <input type="text" id="l_id" placeholder="아이디">
            <input type="password" id="l_pw" placeholder="비밀번호" onkeypress="if(event.key==='Enter') doLogin()">
            <button class="btn btn-blue" onclick="doLogin()">로그인</button>
            <span class="text-link" onclick="toggleAuth('register')">계정이 없으신가요? 회원가입하기</span>
        </div>
        <div id="register-form" style="display:none;">
            <h2>📝 회원가입</h2>
            <input type="text" id="r_id" placeholder="아이디">
            <input type="password" id="r_pw" placeholder="비밀번호">
            <input type="text" id="r_nick" placeholder="게임에서 쓸 닉네임 (별명)" onkeypress="if(event.key==='Enter') doRegister()">
            <button class="btn btn-green" onclick="doRegister()">가입하기</button>
            <span class="text-link" onclick="toggleAuth('login')">이미 계정이 있으신가요? 로그인하기</span>
        </div>
    </div>

    <div id="screen-lobby" class="screen">
        <button class="btn-logout" onclick="doLogout()">로그아웃</button>
        <h2>멀티플레이 로비</h2>
        <p id="welcomeMsg" style="color: #2980b9; font-weight: bold;"></p>
        <button class="btn btn-blue" onclick="showScreen('screen-create')">새 게임방 만들기</button>
        <button class="btn btn-green" onclick="showScreen('screen-roomlist')">게임방 참가하기</button>
    </div>

    <div id="screen-create" class="screen">
        <h2>🛠️ 새 게임방 만들기</h2>
        <input type="text" id="c_roomName" placeholder="게임방 명칭 (필수)">
        <input type="password" id="c_roomPw" placeholder="방 패스워드 (선택사항)">
        <hr>
        <p style="font-size:14px; color:#555;">먹고싶은 메뉴를 입력하세요</p>
        <input type="text" id="c_menu1" placeholder="메뉴 1 (필수) ex) 피자">
        <input type="text" id="c_menu2" placeholder="메뉴 2 (선택)">
        <input type="text" id="c_menu3" placeholder="메뉴 3 (선택)">
        <button class="btn btn-blue" onclick="createRoom()">방 생성 및 입장</button>
        <button class="btn btn-gray" onclick="showScreen('screen-lobby')">뒤로 가기</button>
    </div>

    <div id="screen-roomlist" class="screen" style="max-width: 800px;">
        <h2>🚪 활성화된 게임방 목록</h2>
        <p style="font-size: 14px; color: #555;">방을 <b>더블클릭</b>하여 참가하거나, <b>관전</b> 버튼을 누르세요!</p>
        <table>
            <thead><tr><th>방제</th><th>상태</th><th>인원</th><th>잠금</th><th>액션</th></tr></thead>
            <tbody id="roomTableBody"></tbody>
        </table>
        <button class="btn btn-gray" onclick="showScreen('screen-lobby')">로비로 돌아가기</button>
    </div>

    <div id="screen-join" class="screen">
        <h2 id="j_roomTitle">방 참가</h2>
        <input type="password" id="j_roomPw" placeholder="방 패스워드 입력" style="display:none;">
        <hr>
        <input type="text" id="j_menu1" placeholder="메뉴 1 (필수) ex) 치킨">
        <input type="text" id="j_menu2" placeholder="메뉴 2 (선택)">
        <input type="text" id="j_menu3" placeholder="메뉴 3 (선택)">
        <button class="btn btn-green" onclick="joinRoom()">전장 입장</button>
        <button class="btn btn-gray" onclick="cancelJoin()">취소 및 뒤로 가기</button>
    </div>

    <div id="screen-game">
        <div class="battle-container" id="battleContainer">
            <div class="battle-overlay">
                <div class="battle-text" id="roundText">대기 중...</div>
            </div>
            <canvas id="gameCanvas"></canvas>
            
            <div class="battle-ui-buttons">
                <button id="startBtn" class="action-btn" style="display:none; background:#27ae60;" onclick="startGame()">⚔️ 대난투 시작</button>
                <button id="copyLinkBtn" class="action-btn" style="display:none; background:#f39c12;" onclick="copyRoomLink()">🔗 초대 링크 복사</button>
                <button id="cancelBtn" class="action-btn" style="display:none; background:#d35400;" onclick="cancelParticipation()">❌ 참가 취소</button>
                <button id="leaveBtn" class="action-btn" style="display:none; background:#7f8c8d;" onclick="leaveRoomUI()">🚪 방 나가기</button>
                <button id="deleteBtn" class="action-btn" style="display:none; background:#8e44ad;" onclick="reqDeleteRoom()">💣 방 폭파</button>
            </div>
        </div>

        <div style="position: relative; height: 0;">
            <button class="toggle-btn" onclick="toggleRightPanel()">▶ 정보창 접기/펴기</button>
        </div>

        <div class="bottom-container">
            
            <div class="panel chat-panel">
                <h3>💬 실시간 채팅</h3>
                <div id="playerList" style="font-size: 13px; color:#bdc3c7; margin-bottom:5px;"></div>
                <div id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="채팅 입력..." onkeypress="if(event.key==='Enter') sendChat()">
                    <button onclick="sendChat()">전송</button>
                </div>
            </div>

            <div class="panel log-panel">
                <h3>📜 전투 로그 창</h3>
                <div id="logMessages"></div>
            </div>

            <div class="panel right-panel" id="rightPanel">
                <h3>🎴 특수 기술/상성/직업/등급</h3>
                
                <div class="guide-buttons">
                    <button class="guide-btn" onclick="openDict('job')">🛡️ 직업 도감</button>
                    <button class="guide-btn" onclick="openDict('grade')">⭐ 등급 도감</button>
                    <button class="guide-btn" onclick="openDict('skill')">🔥 상성/기술</button>
                </div>
                
                <h3 style="border:none; border-top: 1px solid #7f8c8d; padding-top:10px; margin-top:5px;">📋 카드 정보 판 (클릭)</h3>
                <div id="cardList"></div>
            </div>
            
        </div>
    </div>

    <script>
        const socket = io();
        let myUserId = "", myNickname = "", isAdmin = false;
        let myRoomId = "", selectedRoomId = "", selectedRoomRequiresPw = false;
        let playersData = [];
        let initialRouteHandled = false;
        
        const affinityEmoji = { 'SPICY':'🌶️', 'GREASY':'🍗', 'FRESH':'🥗', 'SALTY':'🧂', 'SWEET':'🍰', 'MINT_CHOCO':'🌿', 'PINEAPPLE':'🍍' };

        // UI 제어 로직
        function showScreen(id) {
            document.querySelectorAll('.screen, #screen-game').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'screen-game') { setTimeout(resizeCanvas, 100); }
        }

        function toggleRightPanel() {
            const rp = document.getElementById('rightPanel');
            rp.classList.toggle('minimized');
            setTimeout(resizeCanvas, 300); // 패널 조절 후 캔버스 리사이즈
        }

        // 도감 모달창 로직
        function openDict(type) {
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            if(type === 'job') {
                title.innerText = "🛡️ 직업 도감";
                body.innerHTML = `
                    <b>[전사]</b> 검과 방패. 안정적인 공방 (HP+10, ATK+2)<br>
                    <b>[도적]</b> 단검과 활. 빠른 스피드 (ATK+3)<br>
                    <b>[사제]</b> 메이스. 마력이 높음 (HP+5, MP 80)<br>
                    <b>[버서커]</b> 쌍도끼. 체력을 깎고 극딜 (HP-10, ATK+8)<br>
                    <b>[암살자]</b> 표창과 마스크. 은밀한 일격 (HP-5, ATK+6)<br>
                    <b>[마법사]</b> 강력한 마력통 (ATK+5, MP 100)<br>
                    <b>[탱커]</b> 튼튼한 체력 (HP+30, ATK-2)<br>
                    <b>[궁수]</b> 밸런스 잡힌 원거리 (HP-2, ATK+4)<br>
                    <b>[팔라딘]</b> 방어와 밸런스 (HP+15, ATK+1)<br>
                    <b>[요리사]</b> 식칼 마스터 (HP+10, ATK+1)
                `;
            } else if(type === 'grade') {
                title.innerText = "⭐ 등급 도감";
                body.innerHTML = `
                    <span style="color:#bdc3c7">■ 일반 (Common) : 기본 스탯 (1.0배)</span><br><br>
                    <span style="color:#3498db">■ 희귀 (Rare) : 1.2배 스탯 증가</span><br><br>
                    <span style="color:#9b59b6">■ 영웅 (Epic) : 1.5배 스탯 증가</span><br><br>
                    <span style="color:#f1c40f">■ 전설 (Legendary) : 2.0배 스탯 증가</span><br><br>
                    <span style="color:#e74c3c">■ 신화 (Mythic) : 3.0배 스탯 증가!</span>
                `;
            } else if(type === 'skill') {
                title.innerText = "🔥 상성 및 기술 도감";
                body.innerHTML = `
                    <b style="color:#e74c3c">매콤</b> > 느끼 > 깔끔 > 짭짤 > 달콤 > 매콤<br>
                    <b style="color:#3498db">⭐특수(민트초코, 파인애플):</b> 일반 공격시 2배 데미지, 같은 특수끼리 만나면 세계관 붕괴(즉사)<br>
                    <hr>
                    각 카드는 생성 시 <b>랜덤으로 1개의 특수기술</b>을 부여받습니다.<br>
                    우측 <b>카드 정보 판</b>에서 자신의 카드를 클릭해 확인하세요!
                `;
            }
            document.getElementById('infoModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('infoModal').style.display = 'none'; }

        window.showCardDetail = function(cardId) {
            let card = null;
            playersData.forEach(p => { let found = p.deck.find(c => c.id === cardId); if(found) card = found; });
            if(!card) return;

            document.getElementById('modalTitle').innerText = `🃏 [${card.grade}] ${card.menu}`;
            document.getElementById('modalBody').innerHTML = `
                <b>• 직업 :</b> ${card.job}<br>
                <b>• 상성 :</b> ${affinityEmoji[card.affinity]} ${card.affinity}<br>
                <hr>
                <b>❤️ 체력(HP) :</b> ${card.hp} / ${card.maxHp}<br>
                <b>💧 마력(MP) :</b> ${card.mp} / ${card.maxMp}<br>
                <b>⚔️ 공격력(ATK) :</b> ${card.atk}<br>
                <hr>
                <b>✨ 특수기술 :</b> [${card.skills[0].name}]<br>
                <span style="color:#555;"> - ${card.skills[0].desc}</span>
            `;
            document.getElementById('infoModal').style.display = 'flex';
        };

        // 소켓 기본 인증 로직 (이전과 동일)
        function toggleAuth(type) {
            document.getElementById('login-form').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = type === 'register' ? 'block' : 'none';
        }
        function doRegister() {
            let id = document.getElementById('r_id').value.trim(), pw = document.getElementById('r_pw').value.trim(), nick = document.getElementById('r_nick').value.trim();
            if(!id || !pw || !nick) return alert('모두 입력해주세요.'); socket.emit('register', { id, pw, nickname: nick });
        }
        function doLogin() {
            let id = document.getElementById('l_id').value.trim(), pw = document.getElementById('l_pw').value.trim();
            if(!id || !pw) return alert('ID와 PW를 입력하세요.'); socket.emit('login', { id, pw });
        }
        function doLogout() { if(confirm('로그아웃 하시겠습니까?')) window.location.href = window.location.pathname; }

        socket.on('errorMsg', msg => alert(msg));
        socket.on('authSuccess', msg => { alert(msg); toggleAuth('login'); });
        socket.on('loginSuccess', data => {
            myUserId = data.userId; myNickname = data.nickname; isAdmin = data.isAdmin;
            document.getElementById('welcomeMsg').innerText = `${isAdmin ? '👑관리자' : '👤'} ${myNickname}님 환영합니다!`;
        });
        socket.on('kicked', msg => { alert(msg); history.replaceState(null, '', window.location.pathname); showScreen('screen-lobby'); });
        
        socket.on('updateRoomList', (list) => {
            const tbody = document.getElementById('roomTableBody'); tbody.innerHTML = '';
            list.forEach(room => {
                let status = room.state === 'waiting' ? '<span style="color:green;font-weight:bold;">대기중</span>' : '<span style="color:red;">게임중</span>';
                let lock = room.hasPassword ? '<span class="lock-icon">🔒</span>' : '🔓';
                let adminBtn = isAdmin ? `<button class="btn-red" style="padding:4px;font-size:12px;" onclick="event.stopPropagation(); deleteRoom('${room.id}')">폭파</button>` : '';
                tbody.innerHTML += `
                    <tr ondblclick="selectRoomToJoin('${room.id}', '${room.name}', ${room.hasPassword}, '${room.state}')">
                        <td>${room.name}</td><td>${status}</td><td>${room.players}/6명</td><td>${lock}</td>
                        <td><button class="btn-blue" style="padding:6px;font-size:12px;" onclick="event.stopPropagation(); spectateRoom('${room.id}')">👁️ 관전</button> ${adminBtn}</td>
                    </tr>`;
            });
            if (myUserId && !initialRouteHandled) {
                initialRouteHandled = true; const targetRoomId = new URLSearchParams(window.location.search).get('room');
                if (targetRoomId) { const room = list.find(r => r.id === targetRoomId); if(room) selectRoomToJoin(room.id, room.name, room.hasPassword, room.state); else { alert('존재하지 않는 방입니다.'); history.replaceState(null, '', window.location.pathname); showScreen('screen-lobby'); } }
                else showScreen('screen-lobby');
            }
        });

        window.selectRoomToJoin = function(id, name, hasPw, state) {
            if(state !== 'waiting') return alert('이미 진행 중인 게임방입니다. (관전 버튼을 이용하세요)');
            selectedRoomId = id; selectedRoomRequiresPw = hasPw;
            document.getElementById('j_roomTitle').innerText = `[${name}] 참가`; document.getElementById('j_roomPw').style.display = hasPw ? 'block' : 'none'; showScreen('screen-join');
        };
        window.spectateRoom = function(id) { socket.emit('spectateRoom', id); };
        function cancelJoin() { history.replaceState(null, '', window.location.pathname); showScreen('screen-lobby'); }

        function createRoom() {
            let name = document.getElementById('c_roomName').value.trim(), pw = document.getElementById('c_roomPw').value.trim();
            let menus = [document.getElementById('c_menu1').value, document.getElementById('c_menu2').value, document.getElementById('c_menu3').value].filter(m=>m.trim()!=="");
            if(!name || menus.length===0) return alert('방 제목과 메뉴를 채워주세요!'); socket.emit('createRoom', { roomName: name, password: pw, menus });
        }
        function joinRoom() {
            let pw = selectedRoomRequiresPw ? document.getElementById('j_roomPw').value.trim() : '';
            let menus = [document.getElementById('j_menu1').value, document.getElementById('j_menu2').value, document.getElementById('j_menu3').value].filter(m=>m.trim()!=="");
            if(menus.length===0) return alert('메뉴를 채워주세요!'); socket.emit('joinRoom', { roomId: selectedRoomId, password: pw, menus });
        }

        window.copyRoomLink = function() {
            navigator.clipboard.writeText(window.location.origin + window.location.pathname + '?room=' + myRoomId)
            .then(() => alert('초대 링크가 복사되었습니다!')) .catch(() => alert('링크 복사에 실패했습니다.'));
        };
        window.cancelParticipation = function() { if(confirm('참가를 취소하시겠습니까?')) { socket.emit('cancelParticipation', myRoomId); history.replaceState(null, '', window.location.pathname); window.location.reload(); } };
        window.leaveRoomUI = function() { history.replaceState(null, '', window.location.pathname); window.location.reload(); };
        window.deleteRoom = function(id) { if(confirm('방을 강제 폭파하시겠습니까?')) socket.emit('deleteRoom', id); };
        window.reqDeleteRoom = function() { if(confirm('내 게임 방을 해체하시겠습니까?')) socket.emit('deleteRoom', myRoomId); };
        
        socket.on('joined', (data) => {
            myRoomId = data.roomId; history.pushState(null, '', '?room=' + data.roomId);
            document.getElementById('startBtn').style.display = (data.isMaster && data.state === 'waiting') ? 'block' : 'none';
            document.getElementById('deleteBtn').style.display = data.isMaster ? 'block' : 'none'; 
            document.getElementById('copyLinkBtn').style.display = 'block'; document.getElementById('leaveBtn').style.display = 'block'; 
            document.getElementById('cancelBtn').style.display = (!data.isSpectator && data.state === 'waiting') ? 'block' : 'none';
            showScreen('screen-game');
        });
        
        window.sendChat = function() {
            const input = document.getElementById('chatInput');
            if(input.value.trim() !== '') socket.emit('chatMessage', { roomId: myRoomId, sender: myNickname, text: input.value });
            input.value = '';
        }
        socket.on('chatMessage', (data) => {
            const chatBox = document.getElementById('chatMessages');
            let color = data.sender === 'System' ? 'color: #e74c3c;' : 'color: #2980b9; font-weight: bold;';
            chatBox.innerHTML += `<div style="margin-bottom: 5px;"><span style="${color}">${data.sender}:</span> ${data.text}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });
        
        window.startGame = function() { 
            socket.emit('startGame', myRoomId);
            document.getElementById('startBtn').style.display = 'none'; document.getElementById('copyLinkBtn').style.display = 'none'; document.getElementById('cancelBtn').style.display = 'none'; 
        }

        /* =========================================================
           Three.js 3D 렌더링 & 졸라맨 생성 엔진
           ========================================================= */
        const canvas = document.getElementById('gameCanvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const light = new THREE.DirectionalLight(0xffffff, 0.9);
        light.position.set(10, 20, 10);
        scene.add(light);
        camera.position.set(0, 0, 18);

        let entities = {};
        let meshMap = {};

        function resizeCanvas() { 
            const container = document.getElementById('battleContainer');
            if(!container) return;
            const w = container.clientWidth; const h = container.clientHeight;
            renderer.setSize(w, h);
            camera.aspect = w / h; camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', resizeCanvas);

        // 직업별 졸라맨 생성 함수
        function createStickman(job, gradeColor) {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshPhongMaterial({ color: gradeColor });
            const blackMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
            const grayMat = new THREE.MeshPhongMaterial({ color: 0x95a5a6 });
            const brownMat = new THREE.MeshPhongMaterial({ color: 0x8e44ad }); // 나무/손잡이 색

            // 공통 머리
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), bodyMat);
            head.position.y = 1.2; group.add(head);

            // 공통 몸통
            const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 1.2, 8), bodyMat);
            torso.position.y = 0.3; group.add(torso);

            // 공통 팔 다리 (간소화)
            const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1, 8), bodyMat);
            armL.position.set(-0.4, 0.6, 0); armL.rotation.z = Math.PI/4; group.add(armL);
            
            const armR = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1, 8), bodyMat);
            armR.position.set(0.4, 0.6, 0); armR.rotation.z = -Math.PI/4; group.add(armR);

            const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1.2, 8), bodyMat);
            legL.position.set(-0.2, -0.5, 0); group.add(legL);

            const legR = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1.2, 8), bodyMat);
            legR.position.set(0.2, -0.5, 0); group.add(legR);

            // 직업별 무기/특징 장착
            if (job === '전사') {
                // 오른손 검
                const sword = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.4, 0.1), grayMat);
                sword.position.set(0.8, 0.5, 0); group.add(sword);
                // 왼손 방패
                const shield = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.1, 16), brownMat);
                shield.rotation.x = Math.PI/2; shield.position.set(-0.8, 0.4, 0.2); group.add(shield);
            } 
            else if (job === '도적') {
                // 오른손 단검
                const dagger = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.6, 0.05), grayMat);
                dagger.position.set(0.8, 0.3, 0); group.add(dagger);
                // 등에 멘 활 (간단한 반원)
                const bow = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.05, 8, 16, Math.PI), brownMat);
                bow.rotation.y = Math.PI/2; bow.position.set(0, 0.5, -0.3); group.add(bow);
            }
            else if (job === '사제') {
                // 수녀복 머리 장식
                const habit = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.6, 0.4, 16), blackMat);
                habit.position.y = 1.3; group.add(habit);
                const habitBack = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1, 0.1), blackMat);
                habitBack.position.set(0, 0.8, -0.5); group.add(habitBack);
                // 오른손 메이스
                const maceHandle = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1, 8), brownMat);
                maceHandle.position.set(0.8, 0.5, 0); group.add(maceHandle);
                const maceHead = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8, 8), grayMat);
                maceHead.position.set(0.8, 1.0, 0); group.add(maceHead);
            }
            else if (job === '버서커') {
                // 양손 도끼
                const axeG = new THREE.Group();
                const h = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.8, 8), brownMat);
                const b = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.3, 0.05), grayMat);
                b.position.set(0.2, 0.2, 0); axeG.add(h); axeG.add(b);
                
                const axe1 = axeG.clone(); axe1.position.set(0.8, 0.4, 0); group.add(axe1);
                const axe2 = axeG.clone(); axe2.position.set(-0.8, 0.4, 0); axe2.rotation.y = Math.PI; group.add(axe2);
            }
            else if (job === '암살자') {
                // 복면
                const mask = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.3, 0.52), blackMat);
                mask.position.y = 1.1; group.add(mask);
                // 수리검 (표창)
                const shuri = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.05, 4), grayMat);
                shuri.rotation.x = Math.PI/2; shuri.position.set(0.8, 0.5, 0); group.add(shuri);
            }
            // 나머지 직업은 무기 없는 기본 졸라맨 형태로 출력됨
            
            return group;
        }

        socket.on('updatePlayers', (data) => {
            playersData = data.players;
            document.getElementById('playerList').innerHTML = playersData.map(p => `<span>${p.ownerId === data.masterId ? "👑" : "👤"} ${p.name}</span>`).join(' | ');

            const cardList = document.getElementById('cardList'); cardList.innerHTML = '';
            playersData.forEach(p => {
                p.deck.forEach(c => {
                    cardList.innerHTML += `
                        <div class="card-item ${c.isAlive ? '' : 'dead'}" style="border-left-color: ${c.gradeColor};" onclick="showCardDetail('${c.id}')">
                            <b style="color:${c.gradeColor}">[${c.grade}]</b> <b>${c.menu}</b> <span style="font-size:11px;color:#888;">(${p.name})</span><br>
                            직업: ${c.job} | HP: ${c.hp}/${c.maxHp} | MP: ${c.mp}
                        </div>`;
                    
                    if(!entities[c.id]) {
                        entities[c.id] = { 
                            id: c.id, menu: c.menu, job: c.job, hp: c.hp, maxHp: c.maxHp, isAlive: c.isAlive, color: c.gradeColor, 
                            x: (Math.random() - 0.5) * 20, y: (Math.random() - 0.5) * 8 
                        };
                        entities[c.id].baseX = entities[c.id].x; entities[c.id].baseY = entities[c.id].y;
                    } else { entities[c.id].hp = c.hp; entities[c.id].isAlive = c.isAlive; }
                });
            });
        });

        // 텍스트를 로그 패널에 쌓기
        socket.on('battleLog', (htmlMsg) => {
            const logBox = document.getElementById('logMessages');
            logBox.innerHTML += `<div>${htmlMsg}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
            document.getElementById('roundText').innerHTML = "전투 진행 중..."; // 캔버스 위 글자는 고정
        });

        socket.on('gameFinished', (menu) => {
            document.getElementById('roundText').innerHTML = `🎉 최종 우승: [ ${menu} ] 🎉`;
            const logBox = document.getElementById('logMessages');
            logBox.innerHTML += `<div style="color:gold; font-size:16px; font-weight:bold; margin-top:10px;">🏆 게임 종료! 최종 우승 메뉴: ${menu} 🏆</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        });

        function showDamageText(mesh, text, color, isCrit) {
            const vector = mesh.position.clone(); vector.project(camera);
            const container = document.getElementById('battleContainer');
            const x = (vector.x * 0.5 + 0.5) * container.clientWidth;
            const y = (vector.y * -0.5 + 0.5) * container.clientHeight;
            
            const div = document.createElement('div'); div.innerText = text;
            div.style.position = 'absolute'; div.style.left = x + 'px'; div.style.top = y + 'px';
            div.style.color = color; div.style.fontWeight = 'bold';
            div.style.fontSize = isCrit ? '26px' : '18px'; div.style.pointerEvents = 'none'; 
            div.style.textShadow = '2px 2px 4px black'; div.style.transition = 'all 1s ease-out'; div.style.zIndex = '100';
            
            container.appendChild(div);
            setTimeout(() => { div.style.top = (y - 50) + 'px'; div.style.opacity = '0'; }, 50);
            setTimeout(() => div.remove(), 1050);
        }

        socket.on('playBrawlAnimation', (attackEvents) => {
            attackEvents.forEach(ev => {
                let attacker = entities[ev.attackerId]; let target = entities[ev.targetId];
                if(attacker && target) {
                    attacker.targetX = target.x; attacker.targetY = target.y;
                    setTimeout(() => {
                        let text = ev.damage === 999 ? "💥폭발!" : (ev.damage === 0 ? "빗나감" : `-${ev.damage}`);
                        let color = ev.isCrit ? "#ff4757" : (ev.damage === 999 ? "#ff7f50" : "white");
                        if(meshMap[ev.targetId]) showDamageText(meshMap[ev.targetId], text, color, ev.isCrit);
                        attacker.targetX = attacker.baseX; attacker.targetY = attacker.baseY;
                    }, 400); 
                }
            });
        });

        function gameLoop() {
            requestAnimationFrame(gameLoop);
            Object.values(entities).forEach(e => {
                if(!e.isAlive) {
                    if(meshMap[e.id]) { scene.remove(meshMap[e.id]); delete meshMap[e.id]; }
                    return;
                }

                if(!meshMap[e.id]) {
                    const stickman = createStickman(e.job, e.color);
                    scene.add(stickman);
                    meshMap[e.id] = stickman;
                }

                let mesh = meshMap[e.id];
                if(e.targetX !== undefined) e.x += (e.targetX - e.x) * 0.15;
                if(e.targetY !== undefined) e.y += (e.targetY - e.y) * 0.15;
                
                mesh.position.set(e.x, e.y, 0);
                
                // 가벼운 바운딩(호흡) 애니메이션
                mesh.position.y += Math.sin(Date.now() * 0.005 + e.x) * 0.02;
            });
            renderer.render(scene, camera);
        }
        gameLoop();
    </script>
</body>
</html>
